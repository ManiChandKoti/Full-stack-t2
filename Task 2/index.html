<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>Student Data Retrieval & Sorting Dashboard</h1>

    <section class="controls">
      <div class="left">
        <button id="sortNameBtn">Sort by Name A→Z</button>
        <button id="sortDateBtn">Sort by Date ↑</button>
      </div>
      <div class="right">
        <label for="deptFilter">Filter by Department:</label>
        <select id="deptFilter">
          <option value="All">All</option>
        </select>
      </div>
    </section>

    <section class="table-wrap">
      <table id="studentsTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Department</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <!-- rows injected by JavaScript -->
        </tbody>
      </table>
    </section>

    <section class="counts">
      <h3>Department Counts</h3>
      <ul id="deptCounts">
        <!-- counts injected by JavaScript -->
      </ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
