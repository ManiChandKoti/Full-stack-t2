<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stunning Login System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="glass-panel">
            <h2>Welcome Back</h2>
            <p class="subtitle">Please enter your credentials</p>
            
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="identifier">Username or Email</label>
                    <input type="text" id="identifier" name="identifier" placeholder="admin@example.com">
                    <div class="error-message" id="identifier-error"></div>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••">
                        <button type="button" class="toggle-password" id="togglePassword">Show</button>
                    </div>
                    <div class="error-message" id="password-error"></div>
                </div>
                
                <div class="error-message server-error" id="server-error"></div>
                
                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="loader hidden"></span>
                </button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
